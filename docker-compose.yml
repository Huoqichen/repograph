services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      REPOMAP_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_REPOMAP_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_REPOMAP_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
